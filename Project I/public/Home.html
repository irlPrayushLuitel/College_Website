<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SAIM College – About Us</title>
  <link rel="stylesheet" href="Home.css" />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

<!-- Navigation -->
<nav>
  <div class="nav-container">
    <div class="logo-nav">
      <a href="Home.html">
        <img class="logo" src="logo.png" alt="Logo" />
      </a>
    </div>
    <div class="hamburger" id="hamburger">&#9776;</div>
    <div class="nav-links" id="navLinks">
      <a href="Home.html" class="active">HOME</a>
      <a href="About.html">ABOUT US</a>
      <a href="Enroll.html">ENROLL</a>
      <a href="Contact.html">CONTACT</a>
      <a href="Login.html">LOGIN</a>
    </div>
  </div>
</nav>

<!-- Image Slider -->
<div class="about-slider-container">
  <div class="about-slider-track">
    <div class="about-slide"><img src="saim1.jpg" alt="" style="width:100%; height:100%; object-fit:cover;" /></div>
    <div class="about-slide"><img src="saim2.jpg" alt="" style="width:100%; height:100%; object-fit:cover;" /></div>
    <div class="about-slide"><img src="saim3.jpg" alt="" style="width:100%; height:100%; object-fit:cover;" /></div>
    <div class="about-slide"><img src="saim4.jpg" alt="" style="width:100%; height:100%; object-fit:cover;" /></div>
    <div class="about-slide"><img src="saim5.jpg" alt="" style="width:100%; height:100%; object-fit:cover;" /></div>
  </div>
  <div class="about-slider-nav">
    <button class="about-prev">&lt;</button>
    <button class="about-next">&gt;</button>
  </div>
</div>

<!-- Main Content -->
<div class="container">
  <!-- <h2>Loading...</h2> -->

  <section class="intro">
    <div class="intro-content">
      <blockquote></blockquote>
      <p></p>
      <p></p>
      <p></p>
    </div>
  </section>

  <section class="programs">
    <h2>Program and Courses</h2>
    <div class="program-grid"></div>
  </section>
</div>

<!-- Footer -->
<footer>
  <div class="footer-content">
    <div class="footer-left">📍Old Baneshwor, Kathmandu</div>
    <a href="Contact.html" class="contact-btn">Contact Us</a>
    <div class="footer-right">📞01-4574747 <br> 📞01-4584832</div>
  </div>
</footer>

<!-- Social Icons -->
<div class="social-container">
  <div class="social-icons" id="socialIcons">
    <a href="https://www.instagram.com/saimcollege/" target="_blank" class="social-icon instagram">
      <img src="instagram.png" alt="Instagram" />
    </a>
    <a href="https://www.linkedin.com/company/saim-college/" target="_blank" class="social-icon linkedin">
      <img src="linkedin.png" alt="LinkedIn" />
    </a>
    <a href="https://saim.edu.np/" target="_blank" class="social-icon website">
      <img src="website.png" alt="Website" />
    </a>
  </div>
  <button class="toggle-rectangle" id="toggleSocial">
    <img src="toggle-icon.png" alt="Toggle Links" />
  </button>
</div>

<!-- Scripts -->
<script>
  // Hamburger toggle
  const hamburger = document.getElementById("hamburger");
  const navLinks = document.getElementById("navLinks");
  const links = navLinks.querySelectorAll("a");

  hamburger.addEventListener("click", () => {
    navLinks.classList.toggle("show");
  });
  links.forEach((link) => {
    link.addEventListener("click", () => {
      navLinks.classList.remove("show");
    });
  });

  // Slider functionality
  $(document).ready(function () {
    const $track = $(".about-slider-track");
    const $slides = $(".about-slide");
    let index = 0;
    const total = $slides.length;

    function goToSlide(i) {
      if (i < 0) i = total - 1;
      if (i >= total) i = 0;
      index = i;
      $track.css("transform", "translateX(-" + (i * 100) + "%)");
    }

    $(".about-next").click(() => goToSlide(index + 1));
    $(".about-prev").click(() => goToSlide(index - 1));
    setInterval(() => goToSlide(index + 1), 5000);
  });

  // Social icon toggle
  document.addEventListener("DOMContentLoaded", function () {
    const toggleBtn = document.getElementById("toggleSocial");
    const icons = document.getElementById("socialIcons");
    let visible = false;

    setTimeout(() => {
      icons.classList.add("show");
      setTimeout(() => {
        icons.classList.remove("show");
        toggleBtn.style.display = "flex";
      }, 1500);
    }, 1000);

    toggleBtn.addEventListener("click", function () {
      visible = !visible;
      icons.classList.toggle("show");
      toggleBtn.classList.toggle("open", visible);
    });
  });

  // JSON content loading
  fetch("home_data.json")
    .then(response => response.json())
    .then(data => {
      const home = data.home;

      document.querySelector("h2").textContent = home.welcome_heading;

      const quote = home.quote;
      document.querySelector(".intro blockquote").innerHTML =
        `"${quote.text}" <span class="quote-author">– ${quote.author}</span>`;

      const introContainer = document.querySelector(".intro-content");
      const paragraphs = introContainer.querySelectorAll("p");
      home.introduction.forEach((text, i) => {
        if (paragraphs[i]) {
          paragraphs[i].textContent = text;
        }
      });

      const programGrid = document.querySelector(".program-grid");
      programGrid.innerHTML = "";
      home.programs.forEach(program => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div class="image-hover">
            <img src="${program.image}" alt="${program.title}" />
            <div class="overlay">
              <span class="course-title">${program.id.toUpperCase()}</span>
            </div>
          </div>
          <h3>${program.title}</h3>
          <p>${program.short_description}</p>
          <div class="buttons">
            <a href="About.html?course=${program.id}" class="read-btn">READ MORE</a>
            <a href="${program.apply_link}" class="apply-btn">APPLY NOW</a>
          </div>
        `;
        programGrid.appendChild(card);
      });
    })
    .catch(error => {
      console.error("Failed to load home_data.json:", error);
    });
</script>
</body>
</html>
