<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" type="text/css" href="Password.css" />
    <title>Password Confirmation</title>
  </head>

  <body>
    <nav>
      <div class="nav-container">
        <div class="logo-nav">
          <a href="Home.html">
            <img class="logo" src="logo.png" alt="Logo" />
          </a>
        </div>
        <div class="hamburger" id="hamburger">&#9776;</div>
        <div class="nav-links" id="navLinks">
          <a href="Home.html">HOME</a>
          <a href="About.html">ABOUT US</a>
          <a href="Enroll.html">ENROLL</a>
          <a href="Contact.html">CONTACT</a>
          <a href="LoginPage.html" class="active">LOGIN</a>
        </div>
      </div>
    </nav>

    <main>
      <section class="contact-form" id="passwordSection">
        <h2>Set Your Password</h2>
        <form id="passwordForm">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" required />

          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" required />

          <button type="submit">Set Password</button>
        </form>
        <p id="message" style="color: red; margin-top: 10px;"></p>
      </section>
    </main>

    <footer>
      <div class="footer-content">
        <div class="footer-left">📍 Old Baneshwor, Kathmandu</div>
        <a href="Contact.html" class="contact-btn">Contact Us</a>
        <div class="footer-right">
          📞01-4574747 <br />
          📞01-4584832
        </div>
      </div>
    </footer>

    <!-- Social media icons -->
<div class="social-container">
  <div class="social-icons" id="socialIcons">
    <a href="https://www.instagram.com/saimcollege/" target="_blank" class="social-icon instagram">
      <img src="instagram.png" alt="Instagram" />
    </a>
    <a href="https://www.linkedin.com/company/saim-college/" target="_blank" class="social-icon linkedin">
      <img src="linkedin.png" alt="LinkedIn" />
    </a>
    <a href="https://saim.edu.np/" target="_blank" class="social-icon website">
      <img src="website.png" alt="Website" />
    </a>
  </div>
  <button class="toggle-rectangle" id="toggleSocial">
    <img src="toggle-icon.png" alt="Toggle Links" />
  </button>
</div>

    <script>
      // Hamburger functionality
      const hamburger = document.getElementById("hamburger");
      const navLinks = document.getElementById("navLinks");
      const links = navLinks.querySelectorAll("a");

      hamburger.addEventListener("click", () => {
        navLinks.classList.toggle("show");
      });

      links.forEach((link) => {
        link.addEventListener("click", () => {
          navLinks.classList.remove("show");
        });
      });

      // Custom popup function
      function showSuccessPopup(message, redirectURL) {
        const modal = document.createElement("div");
        modal.classList.add("custom-modal");
        modal.innerHTML = `
          <div class="custom-modal-content">
            <div class="success-icon">✔</div>
            <h3>Thank You!</h3>
            <p>${message}</p>
            <button id="okBtn">OK</button>
          </div>
        `;
        document.body.appendChild(modal);

        document.getElementById("okBtn").addEventListener("click", () => {
          modal.remove();
          window.location.href = redirectURL;
        });

        setTimeout(() => {
          if (document.body.contains(modal)) {
            modal.remove();
            window.location.href = redirectURL;
          }
        }, 5000);
      }

      // Password form functionality
      const form = document.getElementById("passwordForm");
      const message = document.getElementById("message");
      const section = document.getElementById("passwordSection");

      const loginEmail = localStorage.getItem("currentLoginEmail");
      const enrollments = JSON.parse(localStorage.getItem("enrolledStudents")) || [];

      if (!loginEmail) {
        section.innerHTML = '<h2>Set Your Password</h2><p style="color:red">No login email found. Please log in again.</p>';
      } else {
        const currentUserIndex = enrollments.findIndex(user => user.email === loginEmail);

        if (currentUserIndex === -1) {
          section.innerHTML = '<h2>Set Your Password</h2><p style="color:red">No enrollment data found for this email.</p>';
        } else if (enrollments[currentUserIndex].password) {
          section.innerHTML = `<h2>Set Your Password</h2><p style="color:red">Password already set for: ${loginEmail}</p>`;
        } else {
          form.addEventListener("submit", function (e) {
            e.preventDefault();

            const newPassword = document.getElementById("newPassword").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (newPassword.length < 6) {
              message.textContent = "Password must be at least 6 characters.";
              return;
            }

            if (newPassword !== confirmPassword) {
              message.textContent = "Passwords do not match.";
              return;
            }

            enrollments[currentUserIndex].password = newPassword;
            localStorage.setItem("enrolledStudents", JSON.stringify(enrollments));
            localStorage.removeItem("currentLoginEmail");

            showSuccessPopup("Your password has been set successfully!", "Home.html");
          });
        }
      }

      // Social media toggle
      document.addEventListener("DOMContentLoaded", function () {
        const toggleBtn = document.getElementById("toggleSocial");
        const icons = document.getElementById("socialIcons");
        let visible = false;

        setTimeout(() => {
          icons.classList.add("show");
          setTimeout(() => {
            icons.classList.remove("show");
            toggleBtn.style.display = "flex";
          }, 1500);
        }, 1000);

        toggleBtn.addEventListener("click", function () {
          visible = !visible;
          icons.classList.toggle("show");
          toggleBtn.classList.toggle("open", visible);
        });
      });
    </script>
  </body>
</html>
