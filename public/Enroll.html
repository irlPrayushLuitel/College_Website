<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enroll Page</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" type="text/css" href="Enroll.css">
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
</head>
<body>
  <nav>
    <div class="nav-container">
      <div class="logo-nav">
        <a href="index.html">
          <img class="logo" src="logo.png" alt="Logo" />
        </a>
      </div>
      <div class="hamburger" id="hamburger">&#9776;</div>
      <div class="nav-links" id="navLinks">
        <a href="index.html">HOME</a>
        <a href="About.html">ABOUT US</a>
        <a href="Enroll.html" class="active">ENROLL</a>
        <a href="Contact.html">CONTACT</a>
        <a href="Login.html">LOGIN</a>
      </div>
    </div>
  </nav>

  <main>
    <div class="container">
      <h2>Enrollment Form</h2>
      <form id="enrollForm">
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" required>
        <span class="error" id="nameError"></span>

        <label for="dob">Date of Birth:</label>
        <input type="text" id="dob" name="dob" required>
        <span class="error" id="dobError"></span>

        <label for="email">Email:</label>
        <input type="text" id="email" name="email" required>
        <span class="error" id="emailError"></span>

        <label for="course">Course:</label>
        <select id="course" name="course" required>
          <option value="">--Select--</option>
          <option value="BCSIT">BCSIT</option>
          <option value="BBA">BBA</option>
          <option value="BCA">BCA</option>
        </select>
        <span class="error" id="courseError"></span>

        <button type="submit">Submit</button>
      </form>
    </div>
  </main>

  <footer>
    <div class="footer-content">
      <div class="footer-left">📍Old Baneshwor, Kathmandu</div>
      <a href="Contact.html" class="contact-btn">Contact Us</a>
      <div class="footer-right">📞01-4574747 <br> 📞01-4584832</div>
    </div>
  </footer>

  <!-- Social media icons -->
<div class="social-container">
  <div class="social-icons" id="socialIcons">
    <a href="https://www.instagram.com/saimcollege/" target="_blank" class="social-icon instagram">
      <img src="instagram.png" alt="Instagram" />
    </a>
    <a href="https://www.linkedin.com/company/saim-college/" target="_blank" class="social-icon linkedin">
      <img src="linkedin.png" alt="LinkedIn" />
    </a>
    <a href="https://saim.edu.np/" target="_blank" class="social-icon website">
      <img src="website.png" alt="Website" />
    </a>
  </div>
  <button class="toggle-rectangle" id="toggleSocial">
    <img src="toggle-icon.png" alt="Toggle Links" />
  </button>
</div>

  <!-- Custom Thank You Modal -->
<div id="thankYouModal" class="thank-you-modal">
  <div class="thank-you-content">
    <div class="checkmark">&#10004;</div>
    <h2>Thank You!</h2>
    <p>Your details have been successfully submitted.</p>
    <button id="modalOkBtn">OK</button>
  </div>
</div>


  <script src="enroll.js"></script>
</body>
</html>
